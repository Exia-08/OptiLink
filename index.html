<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Sign In - OptiLink</title>
    <style>
        :root {
            --blue: #3E7BFA;
            --violet: #8B3FF0;
            --ink: #1B1730;
            --ink-soft: #4B4768;
            --muted: #8985A3;
            --bg: #FAFAFD;
            --surface: #FFFFFF;
            --surface-alt: #F2F0FB;
            --border: #E7E4F5;
            --danger: #E5484D;
            --danger-bg: #FDEBEC;
            --gradient: linear-gradient(120deg, var(--blue), var(--violet));
            --shadow-sm: 0 1px 2px rgba(27, 23, 48, 0.06);
            --shadow-md: 0 8px 24px rgba(60, 40, 130, 0.10);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 15px;
            line-height: 1.45;
            color: var(--ink);
            background-color: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        button, input { font-family: inherit; -webkit-tap-highlight-color: transparent; }
        a { color: inherit; text-decoration: none; }

        #app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: var(--bg);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
        }

        .login-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px 26px;
            padding-top: max(48px, env(safe-area-inset-top));
            padding-bottom: max(32px, env(safe-area-inset-bottom));
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            display: block;
        }

        .brand-title {
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .brand-title .accent {
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand-sub {
            color: var(--muted);
            font-size: 13.5px;
            margin-top: 4px;
        }

        .card {
            background-color: var(--surface);
            border-radius: 16px;
            padding: 22px 20px 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .segmented {
            display: flex;
            background-color: var(--surface-alt);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 18px;
        }

        .segmented button {
            flex: 1;
            border: none;
            background: none;
            padding: 9px 4px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .segmented button.active {
            background-color: var(--surface);
            color: var(--ink);
            box-shadow: 0 1px 3px rgba(27,23,48,0.10);
        }

        .field-label {
            font-weight: 600;
            font-size: 13px;
            display: block;
            margin-bottom: 6px;
            color: var(--ink-soft);
        }

        .field-group {
            margin-bottom: 16px;
        }

        .input-wrap {
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14.5px;
            box-sizing: border-box;
            background-color: var(--surface);
            color: var(--ink);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .input-field.has-toggle { padding-right: 46px; }

        .input-field:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(62, 123, 250, 0.12);
        }

        .input-field.error {
            border-color: var(--danger);
        }

        .toggle-visibility {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            padding: 8px;
            color: var(--muted);
            line-height: 1;
        }

        .error-text {
            color: var(--danger);
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
            display: none;
        }
        .error-text.show { display: block; }

        .btn {
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14.5px;
            padding: 13px 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            transition: transform 0.12s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            user-select: none;
        }
        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--gradient);
            color: #fff;
            box-shadow: 0 6px 16px rgba(90, 60, 220, 0.22);
            margin-top: 4px;
        }
        .btn-primary:disabled {
            opacity: 0.55;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        .spinner.show { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .forgot-row {
            text-align: right;
            margin-top: -8px;
            margin-bottom: 18px;
        }

        .link-btn {
            background: none;
            border: none;
            padding: 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--blue);
            cursor: pointer;
        }
        .link-btn:active { opacity: 0.7; }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 22px 0 18px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border);
        }

        .signup-row {
            text-align: center;
            font-size: 13.5px;
            color: var(--muted);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 26px;
            font-size: 12.5px;
            color: var(--muted);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%) translateY(20px);
            background-color: var(--ink);
            color: #fff;
            padding: 11px 18px;
            border-radius: 999px;
            font-size: 13.5px;
            font-weight: 600;
            box-shadow: var(--shadow-md);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 50;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Sheet-style modal for forgot password / support */
        .sheet-backdrop {
            position: fixed;
            inset: 0;
            background-color: rgba(27, 23, 48, 0.45);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 60;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .sheet-backdrop.show { opacity: 1; pointer-events: auto; }

        .sheet {
            width: 100%;
            max-width: 480px;
            background-color: var(--surface);
            border-radius: 20px 20px 0 0;
            padding: 22px 22px max(22px, env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.25s ease;
        }
        .sheet-backdrop.show .sheet { transform: translateY(0); }

        .sheet-handle {
            width: 36px;
            height: 4px;
            border-radius: 2px;
            background-color: var(--border);
            margin: 0 auto 16px;
        }

        .sheet h3 {
            margin: 0 0 6px;
            font-size: 17px;
            font-weight: 700;
        }
        .sheet p.desc {
            color: var(--muted);
            font-size: 13.5px;
            margin: 0 0 18px;
        }
    </style>
</head>

    <script>
        let mode = 'email'; // 'email' | 'phone'
        let passwordVisible = false;

        function switchTab(tab) {
            mode = tab;
            document.getElementById('tabEmail').classList.toggle('active', tab === 'email');
            document.getElementById('tabPhone').classList.toggle('active', tab === 'phone');

            const input = document.getElementById('identifier');
            const label = document.getElementById('identifierLabel');
            const err = document.getElementById('identifierError');
            input.classList.remove('error');
            err.classList.remove('show');
            input.value = '';

            if (tab === 'email') {
                label.textContent = 'Email';
                input.type = 'email';
                input.placeholder = 'you@example.com';
                input.inputMode = 'email';
                input.autocomplete = 'username';
                err.textContent = 'Enter a valid email address.';
            } else {
                label.textContent = 'Phone Number';
                input.type = 'tel';
                input.placeholder = '(555) 123-4567';
                input.inputMode = 'tel';
                input.autocomplete = 'tel';
                err.textContent = 'Enter a valid phone number.';
            }
            input.focus();
        }

        function togglePassword() {
            passwordVisible = !passwordVisible;
            const pw = document.getElementById('password');
            const btn = document.getElementById('toggleBtn');
            pw.type = passwordVisible ? 'text' : 'password';
            btn.textContent = passwordVisible ? '🙈' : '👁️';
            btn.setAttribute('aria-label', passwordVisible ? 'Hide password' : 'Show password');
        }

        function isValidEmail(v) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
        }

        function isValidPhone(v) {
            const digits = v.replace(/\D/g, '');
            return digits.length >= 7;
        }

        function handleLogin(evt) {
            evt.preventDefault();

            // Presentation only — no validation, just proceed to the app.
            setLoading(true);
            setTimeout(() => {
                setLoading(false);
                showToast('Signed in successfully');
                setTimeout(() => {
                    window.location.href = 'optilink.html';
                }, 700);
            }, 800);

            return false;
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const text = document.getElementById('loginBtnText');
            btn.disabled = isLoading;
            spinner.classList.toggle('show', isLoading);
            text.textContent = isLoading ? 'Signing in…' : 'Log In';
        }

        let toastTimer = null;
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
        }

        const sheets = {
            forgot: {
                title: 'Reset your password',
                body: `
                    <p class="desc">Enter the email or phone number on your account and we'll send a link to reset your password.</p>
                    <div class="field-group">
                        <label class="field-label" for="resetIdentifier">Email or Phone Number</label>
                        <input type="text" id="resetIdentifier" class="input-field" placeholder="you@example.com">
                    </div>
                    <button type="button" class="btn btn-primary" onclick="submitReset()">Send Reset Link</button>
                `
            },
            signup: {
                title: 'Create your account',
                body: `
                    <p class="desc">New to OptiLink? Set up your account to book appointments, store prescriptions, and try on frames virtually.</p>
                    <div class="field-group">
                        <label class="field-label" for="signupName">Full Name</label>
                        <input type="text" id="signupName" class="input-field" placeholder="Enter your full name">
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" class="input-field" placeholder="you@example.com">
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="signupPassword">Create Password</label>
                        <input type="password" id="signupPassword" class="input-field" placeholder="At least 8 characters">
                    </div>
                    <button type="button" class="btn btn-primary" onclick="submitSignup()">Create Account</button>
                `
            },
            support: {
                title: 'Contact Support',
                body: `
                    <p class="desc">We're here to help with logins, bookings, or anything else.</p>
                    <div class="card" style="margin-bottom: 10px; box-shadow: none;">
                        <p style="font-weight: 700; margin-bottom: 2px;">📞 Call Us</p>
                        <p style="color: var(--muted); font-size: 13px;">Mon–Fri, 9:00 AM – 6:00 PM</p>
                        <p style="font-weight: 600; margin-top: 4px;">(555) 010-2020</p>
                    </div>
                    <div class="card" style="margin-bottom: 10px; box-shadow: none;">
                        <p style="font-weight: 700; margin-bottom: 2px;">✉️ Email Us</p>
                        <p style="font-weight: 600; margin-top: 4px;">support@optilink.com</p>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="closeSheet(); showToast('Opening chat…')">Start Live Chat</button>
                `
            }
        };

        function openSheet(key) {
            const data = sheets[key];
            document.getElementById('sheetContent').innerHTML = `<h3>${data.title}</h3>${data.body}`;
            document.getElementById('sheetBackdrop').classList.add('show');
        }

        function closeSheet() {
            document.getElementById('sheetBackdrop').classList.remove('show');
        }

        function closeSheetOnBackdrop(evt) {
            if (evt.target.id === 'sheetBackdrop') closeSheet();
        }

        function submitReset() {
            const val = document.getElementById('resetIdentifier').value.trim();
            if (!val) {
                showToast('Enter an email or phone number');
                return;
            }
            closeSheet();
            showToast('Reset link sent — check your inbox');
        }

        function submitSignup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const pw = document.getElementById('signupPassword').value;
            if (!name || !isValidEmail(email) || pw.length < 8) {
                showToast('Please complete all fields correctly');
                return;
            }
            closeSheet();
            showToast('Account created — welcome to OptiLink');
        }
    </script>
</body>
</html>
