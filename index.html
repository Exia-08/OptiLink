<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Sign In - OptiLink</title>
    <style>
        :root {
            --blue: #3E7BFA;
            --violet: #8B3FF0;
            --ink: #1B1730;
            --ink-soft: #4B4768;
            --muted: #8985A3;
            --bg: #FAFAFD;
            --surface: #FFFFFF;
            --surface-alt: #F2F0FB;
            --border: #E7E4F5;
            --danger: #E5484D;
            --danger-bg: #FDEBEC;
            --gradient: linear-gradient(120deg, var(--blue), var(--violet));
            --shadow-sm: 0 1px 2px rgba(27, 23, 48, 0.06);
            --shadow-md: 0 8px 24px rgba(60, 40, 130, 0.10);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 15px;
            line-height: 1.45;
            color: var(--ink);
            background-color: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        button, input { font-family: inherit; -webkit-tap-highlight-color: transparent; }
        a { color: inherit; text-decoration: none; }

        #app {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background-color: var(--bg);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
        }

        .login-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px 26px;
            padding-top: max(48px, env(safe-area-inset-top));
            padding-bottom: max(32px, env(safe-area-inset-bottom));
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            width: 132px;
            height: 132px;
            margin: 0 auto 12px;
            display: block;
            object-fit: contain;
        }

        .brand-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .brand-title .accent {
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand-sub {
            color: var(--muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .card {
            background-color: var(--surface);
            border-radius: 16px;
            padding: 22px 20px 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .segmented {
            display: flex;
            background-color: var(--surface-alt);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 18px;
        }

        .segmented button {
            flex: 1;
            border: none;
            background: none;
            padding: 9px 4px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .segmented button.active {
            background-color: var(--surface);
            color: var(--ink);
            box-shadow: 0 1px 3px rgba(27,23,48,0.10);
        }

        .field-label {
            font-weight: 600;
            font-size: 13px;
            display: block;
            margin-bottom: 6px;
            color: var(--ink-soft);
        }

        .field-group {
            margin-bottom: 16px;
        }

        .input-wrap {
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 14.5px;
            box-sizing: border-box;
            background-color: var(--surface);
            color: var(--ink);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .input-field.has-toggle { padding-right: 46px; }

        .input-field:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(62, 123, 250, 0.12);
        }

        .input-field.error {
            border-color: var(--danger);
        }

        .toggle-visibility {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            padding: 8px;
            color: var(--muted);
            line-height: 1;
        }

        .error-text {
            color: var(--danger);
            font-size: 12px;
            font-weight: 600;
            margin-top: 6px;
            display: none;
        }
        .error-text.show { display: block; }

        .btn {
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14.5px;
            padding: 13px 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            transition: transform 0.12s ease, box-shadow 0.15s ease, opacity 0.15s ease;
            user-select: none;
        }
        .btn:active { transform: scale(0.98); }

        .btn-primary {
            background: var(--gradient);
            color: #fff;
            box-shadow: 0 6px 16px rgba(90, 60, 220, 0.22);
            margin-top: 4px;
        }
        .btn-primary:disabled {
            opacity: 0.55;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 15px;
            height: 15px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }
        .spinner.show { display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .forgot-row {
            text-align: right;
            margin-top: -8px;
            margin-bottom: 18px;
        }

        .link-btn {
            background: none;
            border: none;
            padding: 0;
            font-size: 13px;
            font-weight: 600;
            color: var(--blue);
            cursor: pointer;
        }
        .link-btn:active { opacity: 0.7; }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 22px 0 18px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border);
        }

        .signup-row {
            text-align: center;
            font-size: 13.5px;
            color: var(--muted);
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%) translateY(20px);
            background-color: var(--ink);
            color: #fff;
            padding: 11px 18px;
            border-radius: 999px;
            font-size: 13.5px;
            font-weight: 600;
            box-shadow: var(--shadow-md);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 50;
            white-space: nowrap;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="login-wrap">
            <div class="brand">
                <img src="optilink-logo.png" alt="OptiLink Logo" class="brand-logo">
                <div class="brand-title">Opti<span class="accent">Link</span></div>
                <p class="brand-sub">Access your vision care portal</p>
            </div>

            <div class="card">
                <div class="segmented">
                    <button type="button" class="active" id="tabClient" onclick="switchTab('client')">Client</button>
                    <button type="button" id="tabStaff" onclick="switchTab('staff')">Staff</button>
                </div>

                <form id="loginForm" onsubmit="return handleLogin(event)" novalidate>
                    <div class="field-group" id="identifierGroup">
                        <label class="field-label" for="identifier" id="identifierLabel">Email</label>
                        <input type="text" id="identifier" class="input-field" placeholder="client@example.com" autocomplete="username">
                        <p class="error-text" id="identifierError">Please enter your details.</p>
                    </div>

                    <div class="field-group">
                        <label class="field-label" for="password">Password</label>
                        <div class="input-wrap">
                            <input type="password" id="password" class="input-field has-toggle" placeholder="Enter your password" autocomplete="current-password">
                            <button type="button" class="toggle-visibility" id="toggleBtn" onclick="togglePassword()" aria-label="Show password">👁️</button>
                        </div>
                    </div>

                    <div class="forgot-row">
                        <button type="button" class="link-btn" onclick="showToast('Password reset link sent')">Forgot password?</button>
                    </div>

                    <button type="submit" class="btn btn-primary" id="loginBtn">
                        <span class="spinner" id="loginSpinner"></span>
                        <span id="loginBtnText">Log In</span>
                    </button>
                </form>

                <div class="divider">OR</div>

                <p class="signup-row">
                    Don't have an account?
                    <button type="button" class="link-btn" onclick="showToast('Sign up unavailable in demo')">Sign up</button>
                </p>
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        let mode = 'client'; 
        let passwordVisible = false;

        function switchTab(tab) {
            mode = tab;
            document.getElementById('tabClient').classList.toggle('active', tab === 'client');
            document.getElementById('tabStaff').classList.toggle('active', tab === 'staff');

            const input = document.getElementById('identifier');
            const label = document.getElementById('identifierLabel');
            
            input.value = '';

            if (tab === 'client') {
                label.textContent = 'Email';
                input.type = 'email';
                input.placeholder = 'client@example.com';
            } else {
                label.textContent = 'Account Number';
                input.type = 'text';
                input.placeholder = 'e.g. STAFF-001';
            }
            input.focus();
        }

        function togglePassword() {
            passwordVisible = !passwordVisible;
            const pw = document.getElementById('password');
            const btn = document.getElementById('toggleBtn');
            pw.type = passwordVisible ? 'text' : 'password';
            btn.textContent = passwordVisible ? '🙈' : '👁️';
        }

        function handleLogin(evt) {
            evt.preventDefault();
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('loginSpinner');
            const text = document.getElementById('loginBtnText');
            
            btn.disabled = true;
            spinner.classList.add('show');
            text.textContent = 'Signing in…';
            
            setTimeout(() => {
                showToast('Signed in successfully');
                setTimeout(() => {
                    // Redirect based on login mode
                    if(mode === 'staff') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'optilink.html';
                    }
                }, 700);
            }, 800);

            return false;
        }

        let toastTimer = null;
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
        }
    </script>
</body>
</html>
